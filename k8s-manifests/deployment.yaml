apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-app-deployment
  labels:
    app: python-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-app-container
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/my-python-app:latest
        ports:
        - containerPort: 8000 
---
apiVersion: v1
kind: Service
metadata:
  name: python-app-service
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000 
  selector:
    app: python-app
